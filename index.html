<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #ffffff; --text: #1d1d1f; --surface: #f2f2f7; --accent: #a0835d; --border: rgba(0,0,0,0.1); --font-size: 20px;
    }
    [data-theme="sepia"] {
      --bg: #f4ecd8; --text: #5b4636; --surface: #e9dec4; --accent: #8e7352; --border: rgba(91,70,54,0.1);
    }
    [data-theme="dark"] {
      --bg: #2c2c2e; --text: #f5f5f7; --surface: #3a3a3c; --accent: #d1b894; --border: rgba(255,255,255,0.1);
    }
    [data-theme="night"] {
      --bg: #000000; --text: #e5e5ea; --surface: #1c1c1e; --accent: #d1b894; --border: rgba(255,255,255,0.15);
    }

    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: -apple-system, sans-serif; transition: 0.3s; line-height: 1.6;
    }

    .header {
      position: sticky; top: 0; z-index: 100; background: var(--bg); 
      display: flex; align-items: center; justify-content: space-between; 
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .header-btn {
      background: var(--surface); border: none; padding: 8px 16px;
      border-radius: 20px; color: var(--text); font-weight: 600; font-size: 14px;
    }

    .content { padding: 20px 20px 180px; max-width: 600px; margin: 0 auto; }
    .verse { 
      font-family: 'Georgia', serif; font-size: var(--font-size); 
      display: inline; cursor: pointer; border-radius: 4px;
    }
    .verse-num { font-size: 0.6em; font-weight: bold; color: var(--accent); margin-right: 6px; vertical-align: super; }
    .verse.selected { background: rgba(160, 131, 93, 0.3); }

    /* Оверлей выбора книги */
    .overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: none; flex-direction: column;
    }
    .overlay.open { display: flex; }
    .overlay-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .overlay-content { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .book-list { overflow-y: auto; border-right: 1px solid var(--border); padding: 10px; }
    .chap-grid { overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-content: start; }
    
    .list-item { width: 100%; text-align: left; padding: 12px; border: none; background: none; color: var(--text); border-radius: 8px; }
    .list-item.active { background: var(--accent); color: #fff; }
    .chap-btn { background: var(--surface); border: none; border-radius: 10px; padding: 12px 0; color: var(--text); font-weight: bold; }

    /* Настройки Aa */
    .sheet {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300;
      display: none; align-items: flex-end;
    }
    .sheet.open { display: flex; }
    .sheet-box { background: var(--bg); width: 100%; border-radius: 24px 24px 0 0; padding: 20px 20px 40px; }
    
    .font-ctrl { display: flex; gap: 10px; margin-bottom: 20px; }
    .font-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: var(--text); font-weight: bold; }
    .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .t-btn { height: 45px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; font-size: 11px; font-weight: bold; }
    .t-btn.active { border-color: var(--accent); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg);
      display: flex; justify-content: space-around; padding: 15px 15px 30px; border-top: 1px solid var(--border);
    }
    .action-bar {
      position: fixed; bottom: 90px; left: 20px; right: 20px; background: var(--surface);
      border-radius: 15px; padding: 15px; display: none; justify-content: space-around; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .action-bar.open { display: flex; }
  </style>
</head>
<body data-theme="sepia">

<div class="header">
  <button class="header-btn" id="cur-ref" onclick="openSelector()">Загрузка...</button>
  <button class="header-btn" onclick="openSheet('settings-sheet')">Aa</button>
</div>

<div class="content" id="reader"></div>

<div class="bottom-nav">
  <button class="header-btn" onclick="nav(-1)">← Назад</button>
  <button class="header-btn" onclick="nav(1)">Вперед →</button>
</div>

<div class="action-bar" id="action-bar">
  <button onclick="copyV()">📋 Копия</button>
  <button onclick="clearV()">✕ Отмена</button>
</div>

<div class="overlay" id="selector">
  <div class="overlay-header"><b>Оглавление</b> <button onclick="closeSelector()">✕</button></div>
  <div class="overlay-content">
    <div class="book-list" id="books"></div>
    <div class="chap-grid" id="chapters"></div>
  </div>
</div>

<div class="sheet" id="settings-sheet" onclick="closeSheet()">
  <div class="sheet-box" onclick="event.stopPropagation()">
    <div class="font-ctrl">
      <button class="font-btn" onclick="changeFont(-2)">А-</button>
      <button class="font-btn" onclick="changeFont(2)">А+</button>
    </div>
    <div class="theme-grid">
      <div class="t-btn" style="background:#fff; color:#000; border:1px solid #ccc;" onclick="setT('light')">Свет</div>
      <div class="t-btn" style="background:#f4ecd8; color:#5b4636;" onclick="setT('sepia')">Бумага</div>
      <div class="t-btn" style="background:#2c2c2e; color:#fff;" onclick="setT('dark')">Графит</div>
      <div class="t-btn" style="background:#000; color:#fff;" onclick="setT('night')">Ночь</div>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  let bible = null;
  let sB = 0, sC = 0;
  let selected = new Set();

  async function init() {
    tg.expand();
    const lang = tg.initDataUnsafe.user?.language_code === 'uk' ? 'uk_ogienko.json' : 'ru_synodal.json';
    const res = await fetch('data/' + lang);
    bible = await res.json();
    render();
  }

  function render() {
    const book = bible.books[sB];
    const chapter = book.chapters[sC];
    document.getElementById('cur-ref').innerText = `${book.name} ${sC + 1} ▾`;
    
    let h = `<div style="font-size: 26px; font-weight:800; margin-bottom:20px;">${book.name} ${sC+1}</div>`;
    chapter.verses.forEach(v => {
      h += `<span class="verse" id="v${v.verse}" onclick="sel(${v.verse},'${v.text.replace(/'/g,"")}')"><span class="verse-num">${v.verse}</span>${v.text} </span>`;
    });
    document.getElementById('reader').innerHTML = h;
    window.scrollTo(0,0);
  }

  function sel(n, t) {
    const el = document.getElementById('v'+n);
    el.classList.toggle('selected');
    selected.has(n) ? selected.delete(n) : selected.add(n);
    document.getElementById('action-bar').style.display = selected.size ? 'flex' : 'none';
  }

  function clearV() {
    selected.clear();
    document.querySelectorAll('.verse').forEach(v => v.classList.remove('selected'));
    document.getElementById('action-bar').style.display = 'none';
  }

  function nav(d) {
    sC += d;
    if(sC < 0) { sB = Math.max(0, sB-1); sC = bible.books[sB].chapters.length-1; }
    else if(sC >= bible.books[sB].chapters.length) { sB = Math.min(bible.books.length-1, sB+1); sC = 0; }
    render();
  }

  function openSelector() {
    document.getElementById('selector').classList.add('open');
    const bDiv = document.getElementById('books');
    bDiv.innerHTML = bible.books.map((b, i) => `<button class="list-item ${i===sB?'active':''}" onclick="showChaps(${i})">${b.name}</button>`).join('');
    showChaps(sB);
  }

  function showChaps(i) {
    const cDiv = document.getElementById('chapters');
    cDiv.innerHTML = bible.books[i].chapters.map((_, c) => `<button class="chap-btn" onclick="sB=${i}; sC=${c}; render(); closeSelector();">${c+1}</button>`).join('');
  }

  function closeSelector() { document.getElementById('selector').classList.remove('open'); }
  function openSheet(id) { document.getElementById(id).classList.add('open'); }
  function closeSheet() { document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open')); }
  
  function setT(t) { document.body.setAttribute('data-theme', t); closeSheet(); }
  function changeFont(d) {
    let s = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
    s = Math.max(14, Math.min(30, s + d));
    document.documentElement.style.setProperty('--font-size', s + 'px');
  }

  function copyV() { tg.HapticFeedback.notificationOccurred('success'); clearV(); }

  init();
</script>
</body>
</html>
