<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #ffffff; --text: #1d1d1f; --surface: #f5f5f7;
      --muted: #86868b; --border: rgba(0, 0, 0, 0.08);
      --accent: #007aff; --nav-bg: rgba(255, 255, 255, 0.85);
      --shadow: 0 -4px 24px rgba(0, 0, 0, 0.08); --font-size: 19px;
    }
    :root[data-theme="sepia"] {
      --bg: #fbf0d9; --text: #433422; --surface: #f0e3c8;
      --muted: #8a7b66; --border: rgba(67, 52, 34, 0.15);
      --accent: #d97706; --nav-bg: rgba(251, 240, 217, 0.85);
      --shadow: 0 -4px 24px rgba(67, 52, 34, 0.1);
    }
    :root[data-theme="dark"] {
      --bg: #1c1c1e; --text: #f5f5f7; --surface: #2c2c2e;
      --muted: #8e8e93; --border: rgba(255, 255, 255, 0.1);
      --accent: #0a84ff; --nav-bg: rgba(28, 28, 30, 0.85);
      --shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
    }
    :root[data-theme="night"] {
      --bg: #000000; --text: #e5e5ea; --surface: #1c1c1e;
      --muted: #666666; --border: rgba(255, 255, 255, 0.2);
      --accent: #5e5ce6; --nav-bg: rgba(0, 0, 0, 0.85);
      --shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background 0.3s, color 0.3s; }

    .header { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; padding: max(12px, env(safe-area-inset-top)) 16px 12px; border-bottom: 1px solid var(--border); background: var(--nav-bg); backdrop-filter: blur(12px); }
    .header-title { border: none; background: transparent; color: var(--text); font-size: 17px; font-weight: 600; cursor: pointer; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-weight: 600; }

    .reader-wrap { display: flex; justify-content: center; padding: 20px 24px 140px; }
    .reader { width: 100%; max-width: 640px; font-family: Georgia, serif; font-size: var(--font-size); line-height: 1.65; transition: opacity 0.3s; }
    .chapter-heading { font-family: sans-serif; font-size: 15px; color: var(--muted); text-transform: uppercase; font-weight: bold; margin-bottom: 24px; }

    .verse { display: inline; cursor: pointer; border-radius: 6px; padding: 2px 0; transition: background 0.2s, color 0.2s; }
    .verse.selected { background: var(--accent); color: #fff; border-radius: 4px; padding: 2px; }
    .verse.selected .verse-num { color: #fff; opacity: 0.9; }
    .verse-num { font-size: 0.6em; color: var(--accent); font-weight: bold; vertical-align: super; margin-right: 4px; user-select: none; }

    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25; border-top: 1px solid var(--border); background: var(--nav-bg); backdrop-filter: blur(12px); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .nav-btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 10px; padding: 12px 4px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }

    .overlay { position: fixed; inset: 0; z-index: 40; display: none; flex-direction: column; background: var(--bg); }
    .overlay.open { display: flex; }
    .overlay-header { display: flex; justify-content: space-between; padding: max(12px, env(safe-area-inset-top)) 16px 12px; border-bottom: 1px solid var(--border); }
    .overlay-title { margin: 0; font-size: 18px; font-weight: 700; }
    .overlay-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }

    .book-list { border-right: 1px solid var(--border); overflow-y: auto; padding: 8px; }
    .list-item { width: 100%; border: none; background: transparent; color: var(--text); text-align: left; padding: 14px; border-radius: 10px; font-size: 15px; cursor: pointer; }
    .list-item.active { background: var(--accent); color: #fff; font-weight: 600; }

    .chapter-grid { overflow-y: auto; padding: 16px; display: grid; gap: 10px; grid-template-columns: repeat(4, 1fr); align-content: start; }
    .chapter-btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 12px; padding: 14px 0; font-size: 16px; font-weight: 600; cursor: pointer; }
    .chapter-btn.current { border-color: var(--accent); color: var(--accent); }

    .lang-row { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; overflow-x: auto; }
    .chip { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .sheet-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: 0.3s; }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 51; background: var(--surface); border-radius: 24px 24px 0 0; padding: 16px 20px calc(20px + env(safe-area-inset-bottom)); transform: translateY(105%); transition: 0.3s; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
    .bottom-sheet.open { transform: translateY(0); }

    #verse-sheet { z-index: 60; box-shadow: var(--shadow); border-top: 1px solid var(--border); max-height: 55vh; }
    .sheet-handle { width: 40px; height: 5px; border-radius: 3px; background: var(--muted); margin: 0 auto 16px; opacity: 0.5; }
    .sheet-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
    .sheet-textarea { width: 100%; min-height: 80px; border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: var(--bg); color: var(--text); font-size: 15px; margin-bottom: 12px; font-family: inherit;}

    .toast { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); background: var(--text); color: var(--bg); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .font-controls { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .font-btn { flex: 1; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 10px; padding: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

    @media (max-width: 600px) { .overlay-body { grid-template-columns: 35% 65%; } }
  </style>
</head>
<body>
  <div class="toast" id="toast">Скопировано!</div>

  <div class="app">
    <header class="header">
      <button class="header-title" id="open-selector">Загрузка...</button>
      <button class="icon-btn" id="open-theme">Aa</button>
    </header>

    <main class="reader-wrap">
      <article class="reader" id="reader"><div style="text-align:center; padding: 40px; color: var(--muted);">Загрузка...</div></article>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn" id="prev-btn">Назад</button>
      <button class="nav-btn" id="prayers-btn">Молитвы</button>
      <button class="nav-btn" id="notes-btn">Заметки</button>
      <button class="nav-btn" id="next-btn">Вперед</button>
    </nav>
  </div>

  <section class="overlay" id="selector-overlay">
    <div class="overlay-header">
      <h2 class="overlay-title" id="selector-title">Оглавление</h2>
      <button class="icon-btn" id="close-selector">✕</button>
    </div>
    <div class="lang-row" id="lang-row"></div>
    <div class="overlay-body">
      <div class="book-list" id="book-list"></div>
      <div class="chapter-grid" id="chapter-grid"></div>
    </div>
  </section>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>

  <section class="bottom-sheet" id="verse-sheet">
    <div class="sheet-handle"></div>
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <h3 style="margin:0 0 4px; font-size:17px;" id="verse-sheet-title">Стих</h3>
            <p style="margin:0 0 12px; color:var(--accent); font-size:13px; font-weight: bold;" id="verse-sheet-count"></p>
        </div>
        <button class="icon-btn" style="width: 28px; height: 28px; font-size: 12px;" onclick="clearSelectionAndClose()">✕</button>
    </div>

    <div style="max-height: 120px; overflow-y: auto; margin-bottom: 12px; padding-right: 5px; border-left: 3px solid var(--accent); padding-left: 10px;">
        <p style="margin:0; font-family:Georgia, serif; font-size:16px; line-height:1.5;" id="verse-sheet-text"></p>
    </div>

    <div class="sheet-actions">
      <button class="nav-btn" style="border:none; background:var(--bg);" id="copy-btn"><span id="txt-copy">Копия</span></button>
      <button class="nav-btn" style="border:none; background:var(--bg); color:var(--accent);" id="explain-btn"><span id="txt-explain">Пояснение</span></button>
      <button class="nav-btn" style="border:none; background:var(--bg); color:var(--accent);" id="pray-btn"><span id="txt-pray">Молитва</span></button>
    </div>

    <textarea class="sheet-textarea" id="note-input" placeholder="Заметка к выбранным стихам..."></textarea>
    <button class="nav-btn" style="width: 100%; background:var(--accent); color:#fff; border:none;" id="save-note-btn">Сохранить заметку</button>
  </section>

  <section class="bottom-sheet" id="notes-sheet">
    <div class="sheet-handle"></div>
    <h3 style="margin:0 0 16px;" id="notes-sheet-title">Заметки</h3>
    <div id="notes-list" style="display:flex; flex-direction:column; gap:12px; margin-bottom:16px;"></div>
    <button class="nav-btn" style="width:100%;" id="close-notes-btn">Закрыть</button>
  </section>

  <section class="bottom-sheet" id="theme-sheet">
    <div class="sheet-handle"></div>
    <h3 style="margin:0 0 16px;" id="theme-title">Настройки</h3>
    <div class="font-controls">
      <button class="font-btn" onclick="changeFontSize(-2)">А-</button>
      <button class="font-btn" onclick="changeFontSize(2)">А+</button>
    </div>
    <div id="theme-options" style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;"></div>
    <button class="nav-btn" style="width:100%;" id="close-theme-btn">Закрыть</button>
  </section>

  <script>

    const state = {
      theme: localStorage.getItem("bible.theme") || "sepia",
      lang: localStorage.getItem("bible.lang") || "ru",
      fontSize: parseInt(localStorage.getItem("bible.fontSize")) || 19,
      bookIndex: 0, chapterNumber: 1, currentBible: null, selectorBookIndex: 0,
      selectedVerses: new Map(),
      selectedRefText: ""
    };

    const tg = window.Telegram?.WebApp;
    const cache = new Map();

    function t(key) { return (STRINGS[state.lang] || STRINGS.en)[key] || key; }
    function escapeHtml(str) { return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

    function updateLabels() {
      document.getElementById("selector-title").textContent = t("select");
      document.getElementById("prev-btn").textContent = t("prev");
      document.getElementById("next-btn").textContent = t("next");
      document.getElementById("prayers-btn").textContent = t("prayers");
      document.getElementById("notes-btn").textContent = t("notes");
      document.getElementById("txt-copy").textContent = t("copy");
      document.getElementById("txt-explain").textContent = t("explain");
      document.getElementById("txt-pray").textContent = t("pray");
      document.getElementById("save-note-btn").textContent = t("save");
      document.getElementById("notes-sheet-title").textContent = t("notes");
      document.getElementById("close-notes-btn").textContent = t("close");
      document.getElementById("theme-title").textContent = t("theme");
      document.getElementById("close-theme-btn").textContent = t("close");
    }

    function changeFontSize(delta) {
      state.fontSize = Math.max(14, Math.min(28, state.fontSize + delta));
      localStorage.setItem("bible.fontSize", state.fontSize);
      document.documentElement.style.setProperty('--font-size', `${state.fontSize}px`);
    }

    function showToast(msg) {
      const toast = document.getElementById("toast"); toast.textContent = msg; toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function applyTheme(t) {
      state.theme = t; localStorage.setItem("bible.theme", t); document.documentElement.dataset.theme = t;
      document.getElementById("theme-options").innerHTML = Object.entries(THEMES).map(([k, name]) =>
        `<button class="list-item ${k===state.theme?'active':''}" style="border:1px solid var(--border);" onclick="applyTheme('${k}')">${name}</button>`
      ).join("");
      if (tg) { const c = { light: "#ffffff", sepia: "#fbf0d9", dark: "#1c1c1e", night: "#000000" }; try { tg.setHeaderColor(c[t]); tg.setBackgroundColor(c[t]); } catch(e){} }
    }

    async function setLanguage(newLang) {
      if (!LANGUAGES[newLang]) newLang = "ru"; 

      state.lang = newLang; localStorage.setItem("bible.lang", newLang);
      updateLabels(); clearSelectionAndClose();

      document.getElementById("lang-row").innerHTML = Object.entries(LANGUAGES).map(([k, v]) =>
        `<button class="chip ${k === state.lang ? "active" : ""}" onclick="setLanguage('${k}')">${v.label}</button>`
      ).join("");

      document.getElementById("reader").style.opacity = 0;
      
      // АНТИ-КЭШ: Заставляем Телеграм всегда скачивать актуальный файл
      const fileUrl = LANGUAGES[newLang].file + "?v=" + new Date().getTime();

      try {
        if (!cache.has(newLang)) {
          const res = await fetch(fileUrl);
          if (!res.ok) throw new Error(`Файл ${fileUrl} не найден`);
          
          let data = await res.json();
          let sortedBooks = [];

          // --- УМНЫЙ СОРТИРОВЩИК И ПЕРЕВОДЧИК ---
          data.books.forEach(b => {
              let originalName = b.name.trim();
              
              // Исправляем нестандартные английские названия
              if (originalName === "Psalm") originalName = "Psalms";
              if (originalName === "Song of Songs") originalName = "Song of Solomon";

              // Ищем, на каком месте должна стоять эта книга
              let orderIndex = BIBLE_ORDER.indexOf(originalName);
              if (orderIndex !== -1) {
                  b._orderIndex = orderIndex; // Запоминаем правильное место
                  
                  // Переводим на выбранный язык
                  if (newLang !== 'en' && TRANSLATIONS_MAP[newLang] && TRANSLATIONS_MAP[newLang][originalName]) {
                      b.name = TRANSLATIONS_MAP[newLang][originalName];
                  } else {
                      b.name = originalName; 
                  }
                  
                  sortedBooks.push(b);
              }
          });

          // Сортируем книги в ИДЕАЛЬНО ПРАВИЛЬНОМ порядке!
          sortedBooks.sort((a, b) => a._orderIndex - b._orderIndex);

          // Убираем любые дубликаты (если в файле было несколько одинаковых книг)
          let finalBooks = [];
          let seen = new Set();
          sortedBooks.forEach(b => {
              if (!seen.has(b._orderIndex)) {
                  seen.add(b._orderIndex);
                  finalBooks.push(b);
              }
          });

          data.books = finalBooks;
          cache.set(newLang, data);
        }

        state.currentBible = cache.get(newLang);
        
        // Защита от ошибок индекса после смены языка
        state.bookIndex = Math.min(state.bookIndex, state.currentBible.books.length - 1);
        if (state.bookIndex < 0) state.bookIndex = 0;
        state.chapterNumber = Math.min(state.chapterNumber, state.currentBible.books[state.bookIndex].chapters.length);
        if (state.chapterNumber < 1) state.chapterNumber = 1;
        state.selectorBookIndex = state.bookIndex;

        renderReader();
        if(document.getElementById("selector-overlay").classList.contains("open")) renderSelector();
        setTimeout(() => document.getElementById("reader").style.opacity = 1, 150);
      } catch (e) {
        console.error("Ошибка загрузки:", e);
        document.getElementById("reader").style.opacity = 1;
        document.getElementById("reader").innerHTML = `<div style="text-align:center; padding: 40px; color: red;"><b>Ошибка загрузки!</b><br>${e.message}</div>`;
      }
    }

    function renderReader() {
      if (!state.currentBible || !state.currentBible.books[state.bookIndex]) return;
      
      const bookName = state.currentBible.books[state.bookIndex].name;
      document.getElementById("open-selector").textContent = `${bookName} ${state.chapterNumber} ▾`;

      let html = `<div class="chapter-heading">${bookName} ${state.chapterNumber}</div>`;
      html += state.currentBible.books[state.bookIndex].chapters[state.chapterNumber - 1].verses.map(v =>
        `<span class="verse" data-num="${v.verse}" data-text="${escapeHtml(v.text)}"><sup class="verse-num">${v.verse}</sup>${v.text} </span>`
      ).join("");

      document.getElementById("reader").innerHTML = html;
      localStorage.setItem("bible.last", JSON.stringify({ b: state.bookIndex, c: state.chapterNumber }));
      clearSelectionAndClose();
    }

    document.getElementById("reader").addEventListener("click", e => {
      const el = e.target.closest(".verse");
      if (el) toggleVerse(parseInt(el.dataset.num), el.dataset.text, el);
    });

    function toggleVerse(num, text, el) {
      if (state.selectedVerses.has(num)) {
        state.selectedVerses.delete(num);
        el.classList.remove("selected");
      } else {
        state.selectedVerses.set(num, text);
        el.classList.add("selected");
      }

      if (state.selectedVerses.size > 0) {
        updateVerseSheet();
      } else {
        document.getElementById("verse-sheet").classList.remove("open");
      }
    }

    function clearSelectionAndClose() {
      state.selectedVerses.clear();
      document.querySelectorAll('.verse.selected').forEach(el => el.classList.remove('selected'));
      document.getElementById("verse-sheet").classList.remove("open");
    }

    function updateVerseSheet() {
      const bookName = state.currentBible.books[state.bookIndex].name;
      const nums = Array.from(state.selectedVerses.keys()).sort((a,b) => a - b);

      const combinedText = nums.map(n => `[${n}] ${state.selectedVerses.get(n)}`).join(" ");
      const displayRef = nums.length > 1 ? `${nums[0]}-${nums[nums.length-1]}` : nums[0];
      state.selectedRefText = `${bookName} ${state.chapterNumber}:${displayRef}`;

      document.getElementById("verse-sheet-title").textContent = state.selectedRefText;
      document.getElementById("verse-sheet-count").textContent = t("selected") + nums.length;
      document.getElementById("verse-sheet-text").textContent = combinedText;

      document.getElementById("note-input").value = "";
      document.getElementById("verse-sheet").classList.add("open");
    }

    function renderSelector() {
      document.getElementById("book-list").innerHTML = state.currentBible.books.map((b, i) =>
        `<button class="list-item ${i === state.selectorBookIndex ? "active" : ""}" onclick="state.selectorBookIndex=${i}; renderSelector();">${b.name}</button>`
      ).join("");

      document.getElementById("chapter-grid").innerHTML = state.currentBible.books[state.selectorBookIndex].chapters.map((_, i) =>
        `<button class="chapter-btn ${state.bookIndex === state.selectorBookIndex && state.chapterNumber === i+1 ? "current" : ""}" onclick="changeChap(${state.selectorBookIndex}, ${i+1})">${i+1}</button>`
      ).join("");
    }

    function changeChap(bIdx, cNum) {
      document.getElementById("reader").style.opacity = 0;
      setTimeout(() => {
        state.bookIndex = bIdx; state.chapterNumber = cNum;
        document.getElementById("selector-overlay").classList.remove("open");
        renderReader(); window.scrollTo(0,0);
        document.getElementById("reader").style.opacity = 1;
      }, 150);
    }

    function openSheet(id) { document.querySelectorAll(".bottom-sheet").forEach(el => el.classList.remove("open")); document.getElementById("sheet-backdrop").classList.add("open"); document.getElementById(id).classList.add("open"); }
    function closeSheet() { document.querySelectorAll(".bottom-sheet, .sheet-backdrop").forEach(el => el.classList.remove("open")); }

    document.getElementById("open-theme").onclick = () => openSheet("theme-sheet");
    document.getElementById("open-selector").onclick = () => { renderSelector(); document.getElementById("selector-overlay").classList.add("open"); };
    document.getElementById("close-selector").onclick = () => document.getElementById("selector-overlay").classList.remove("open");
    document.getElementById("sheet-backdrop").onclick = closeSheet;
    document.querySelectorAll("#close-notes-btn, #close-theme-btn").forEach(b => b.onclick = closeSheet);

    document.getElementById("prev-btn").onclick = () => { if (state.chapterNumber > 1) changeChap(state.bookIndex, state.chapterNumber - 1); else if (state.bookIndex > 0) changeChap(state.bookIndex - 1, state.currentBible.books[state.bookIndex - 1].chapters.length); };
    document.getElementById("next-btn").onclick = () => { if (state.chapterNumber < state.currentBible.books[state.bookIndex].chapters.length) changeChap(state.bookIndex, state.chapterNumber + 1); else if (state.bookIndex < state.currentBible.books.length - 1) changeChap(state.bookIndex + 1, 1); };

    document.getElementById("copy-btn").onclick = () => {
      const txt = `${state.selectedRefText}\n${document.getElementById("verse-sheet-text").textContent}`;
      navigator.clipboard.writeText(txt).then(() => { showToast(t("copied")); clearSelectionAndClose(); });
    };

    document.getElementById("explain-btn").onclick = () => {
      if(tg) tg.sendData(`explain:${state.currentBible.books[state.bookIndex].name}:${state.chapterNumber}:${Array.from(state.selectedVerses.keys()).join(",")}`);
      clearSelectionAndClose();
    };

    document.getElementById("pray-btn").onclick = () => {
      if(tg) tg.sendData(`pray:${document.getElementById("verse-sheet-text").textContent}`);
      clearSelectionAndClose();
    };

    document.getElementById("prayers-btn").onclick = () => { if(tg) tg.sendData(`action:open_prayers`); };

    document.getElementById("save-note-btn").onclick = () => {
      const note = document.getElementById("note-input").value.trim(); if (!note) return;
      const notes = JSON.parse(localStorage.getItem("bible.notes") || "[]");
      notes.unshift({ id: Date.now(), ref: state.selectedRefText, txt: note });
      localStorage.setItem("bible.notes", JSON.stringify(notes)); clearSelectionAndClose(); showToast(t("save") + " ✓");
    };

    document.getElementById("notes-btn").onclick = () => {
      const notes = JSON.parse(localStorage.getItem("bible.notes") || "[]");
      document.getElementById("notes-list").innerHTML = notes.length ? notes.map(n => `
        <div style="padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:12px;">
          <strong style="display:block; margin-bottom:6px; color:var(--accent);">${n.ref}</strong>
          <p style="margin:0 0 10px; font-size:14px;">${n.txt}</p>
          <button class="nav-btn" style="padding:6px 12px; border:1px solid var(--border);" onclick="delNote(${n.id})">${t("del")}</button>
        </div>`).join("") : `<div style="color:var(--muted); text-align:center; padding:20px;">${t("noNotes")}</div>`;
      openSheet("notes-sheet");
    };

    window.delNote = (id) => { const notes = JSON.parse(localStorage.getItem("bible.notes") || "[]").filter(n => n.id !== id); localStorage.setItem("bible.notes", JSON.stringify(notes)); document.getElementById("notes-btn").click(); };

    async function init() {
      document.documentElement.style.setProperty('--font-size', `${state.fontSize}px`);
      try { const last = JSON.parse(localStorage.getItem("bible.last")); if (last) { state.bookIndex = last.b; state.chapterNumber = last.c; state.selectorBookIndex = last.b; } } catch(e){}
      applyTheme(state.theme);
      await setLanguage(state.lang);
      if(tg) { tg.ready(); tg.expand(); }
    }
    init();
  </script>
</body>
</html>
