<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #ffffff; --text: #1d1d1f; --surface: #f2f2f7; --accent: #a0835d; --border: rgba(0,0,0,0.1); --fs: 19px;
    }
    [data-theme="sepia"] { --bg: #f4ecd8; --text: #5b4636; --surface: #e9dec4; --accent: #8e7352; }
    [data-theme="dark"] { --bg: #1c1c1e; --text: #f5f5f7; --surface: #2c2c2e; --accent: #d1b894; --border: rgba(255,255,255,0.1); }

    body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: 0.3s; }
    
    /* Шапка */
    .header { position: sticky; top: 0; z-index: 100; background: var(--bg); display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .header-btn { background: var(--surface); border: none; padding: 8px 12px; border-radius: 12px; color: var(--text); font-weight: 600; font-size: 14px; }

    /* Контент */
    .content { padding: 20px 20px 180px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
    .verse { font-family: 'Georgia', serif; font-size: var(--fs); display: inline; cursor: pointer; border-radius: 4px; line-height: 1.7; }
    .v-num { font-size: 0.6em; font-weight: bold; color: var(--accent); margin-right: 6px; vertical-align: super; }
    .verse.selected { background: rgba(160, 131, 93, 0.3); }

    /* Оверлеи (Книги / Настройки) */
    .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
    .overlay.open { display: flex; }
    .overlay-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .scroll-v { overflow-y: auto; padding: 10px; }
    .list-item { width: 100%; text-align: left; padding: 14px; border: none; background: none; color: var(--text); font-size: 16px; border-radius: 8px; }
    .list-item.active { background: var(--accent); color: #fff; }

    /* Панель действий */
    .action-bar { position: fixed; bottom: 30px; left: 20px; right: 20px; background: var(--surface); border-radius: 16px; padding: 15px; display: none; justify-content: space-around; box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 150; }
    .action-bar.open { display: flex; }
    .act-btn { background: none; border: none; color: var(--text); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }

    /* Заметки */
    .note-box { width: 100%; height: 100px; margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
  </style>
</head>
<body data-theme="sepia">

<div class="header">
  <button class="header-btn" onclick="openSelector()" id="ref-btn">Загрузка...</button>
  <div style="display:flex; gap:8px;">
    <button class="header-btn" onclick="switchLang()" id="lang-btn">RU</button>
    <button class="header-btn" onclick="openSettings()">Aa</button>
  </div>
</div>

<div class="content" id="reader"></div>

<div class="overlay" id="selector">
  <div style="padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <b>Выберите книгу</b> <button class="header-btn" onclick="closeSelector()">✕</button>
  </div>
  <div class="overlay-body">
    <div class="scroll-v" id="book-list" style="border-right:1px solid var(--border)"></div>
    <div class="scroll-v" id="chap-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; align-content:start;"></div>
  </div>
</div>

<div class="overlay" id="settings" style="background:rgba(0,0,0,0.5); align-items:flex-end;">
  <div style="background:var(--bg); width:100%; border-radius:20px 20px 0 0; padding:30px 20px;" onclick="event.stopPropagation()">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
      <button class="header-btn" style="flex:1; padding:15px;" onclick="changeFs(-2)">А-</button>
      <button class="header-btn" style="flex:1; padding:15px;" onclick="changeFs(2)">А+</button>
    </div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
      <button class="header-btn" onclick="setT('light')">Свет</button>
      <button class="header-btn" onclick="setT('sepia')">Бумага</button>
      <button class="header-btn" onclick="setT('dark')">Ночь</button>
    </div>
    <button class="header-btn" style="width:100%; margin-top:20px;" onclick="closeSettings()">Готово</button>
  </div>
</div>

<div class="action-bar" id="action-bar">
  <button class="act-btn" onclick="copyV()"><span>📋</span>Копия</button>
  <button class="act-btn" onclick="openNoteInput()"><span>📝</span>Заметка</button>
  <button class="act-btn" onclick="clearSel()"><span>✕</span></button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  let bible = null;
  let bIdx = 0, cIdx = 0;
  let selected = new Map();
  let currentLang = localStorage.getItem('lang') || 'ru';

  async function loadBible() {
    document.getElementById('lang-btn').innerText = currentLang.toUpperCase();
    const file = currentLang === 'ru' ? 'data/ru_synodal.json' : 'data/uk_ogienko.json';
    try {
      const res = await fetch(file + '?v=' + Date.now());
      bible = await res.json();
      render();
    } catch(e) { alert("Ошибка загрузки файла Библии!"); }
  }

  function render() {
    const book = bible.books[bIdx];
    const chapter = book.chapters[cIdx];
    document.getElementById('ref-btn').innerText = `${book.name} ${cIdx + 1} ▾`;
    let h = `<h2 style="font-family:serif">${book.name} ${cIdx + 1}</h2>`;
    chapter.verses.forEach(v => {
      h += `<span class="verse" id="v${v.verse}" onclick="sel(${v.verse},'${v.text.replace(/'/g,"")}')"><span class="v-num">${v.verse}</span>${v.text} </span>`;
    });
    
    // Показываем заметку, если она есть
    const noteKey = `note_${currentLang}_${bIdx}_${cIdx}`;
    const savedNote = localStorage.getItem(noteKey);
    if(savedNote) {
      h += `<div style="margin-top:30px; padding:15px; background:var(--surface); border-radius:10px; font-style:italic;">📝 Моя заметка: ${savedNote}</div>`;
    }

    document.getElementById('reader').innerHTML = h;
    window.scrollTo(0,0);
  }

  function sel(n, t) {
    const el = document.getElementById('v'+n);
    if(selected.has(n)) { selected.delete(n); el.classList.remove('selected'); }
    else { selected.set(n, t); el.classList.add('selected'); }
    document.getElementById('action-bar').classList.toggle('open', selected.size > 0);
  }

  function copyV() {
    const text = Array.from(selected.values()).join(' ');
    navigator.clipboard.writeText(text);
    tg.HapticFeedback.notificationOccurred('success');
    clearSel();
  }

  function openNoteInput() {
    const note = prompt("Введите вашу заметку к этой главе:");
    if(note !== null) {
      localStorage.setItem(`note_${currentLang}_${bIdx}_${cIdx}`, note);
      render();
    }
    clearSel();
  }

  function switchLang() {
    currentLang = currentLang === 'ru' ? 'uk' : 'ru';
    localStorage.setItem('lang', currentLang);
    loadBible();
  }

  function openSelector() {
    document.getElementById('selector').classList.add('open');
    const list = document.getElementById('book-list');
    list.innerHTML = bible.books.map((b, i) => `<button class="list-item ${i===bIdx?'active':''}" onclick="loadChaps(${i})">${b.name}</button>`).join('');
    loadChaps(bIdx);
  }

  function loadChaps(i) {
    const grid = document.getElementById('chap-grid');
    grid.innerHTML = bible.books[i].chapters.map((_, c) => `<button class="header-btn" onclick="setPos(${i},${c})">${c+1}</button>`).join('');
  }

  function setPos(b, c) { bIdx=b; cIdx=c; render(); closeSelector(); }
  function closeSelector() { document.getElementById('selector').classList.remove('open'); }
  function clearSel() { selected.clear(); document.querySelectorAll('.verse').forEach(v => v.classList.remove('selected')); document.getElementById('action-bar').classList.remove('open'); }
  function setT(t) { document.body.setAttribute('data-theme', t); closeSettings(); }
  function changeFs(d) { let s = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs')); document.documentElement.style.setProperty('--fs', (s+d)+'px'); }
  function openSettings() { document.getElementById('settings').classList.add('open'); }
  function closeSettings() { document.getElementById('settings').classList.remove('open'); }

  tg.ready(); tg.expand(); loadBible();
</script>
</body>
</html>
