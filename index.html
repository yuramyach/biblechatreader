<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #ffffff; --text: #1d1d1f; --surface: #f2f2f7;
      --accent: #a0835d; --border: rgba(0,0,0,0.1); --font-serif: Georgia, serif;
    }
    [data-theme="sepia"] {
      --bg: #f4ecd8; --text: #5b4636; --surface: #e9dec4; --accent: #8e7352;
    }
    [data-theme="dark"] {
      --bg: #1c1c1e; --text: #f5f5f7; --surface: #2c2c2e; --accent: #d1b894; --border: rgba(255,255,255,0.1);
    }

    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: -apple-system, system-ui, sans-serif; transition: 0.3s;
      user-select: none; -webkit-user-select: none;
    }

    /* Шапка как в YouVersion */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); display: flex; align-items: center;
      justify-content: space-between; padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-btn {
      background: var(--surface); border: none; padding: 8px 16px;
      border-radius: 20px; color: var(--text); font-weight: 600; font-size: 14px;
    }

    /* Текст Библии */
    .content { padding: 20px 20px 150px; max-width: 600px; margin: 0 auto; }
    .book-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; font-family: var(--font-serif); }
    .verse { 
      font-family: var(--font-serif); font-size: 20px; line-height: 1.6; 
      display: inline; cursor: pointer; border-radius: 4px; transition: 0.2s;
    }
    .verse-num { font-size: 12px; font-weight: bold; color: var(--accent); margin-right: 4px; vertical-align: super; }
    .verse.selected { background: rgba(160, 131, 93, 0.3); }

    /* Нижняя панель действий (выезжает при клике) */
    .action-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
      border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%);
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
    }
    .action-sheet.open { transform: translateY(0); }
    .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
    .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; }
    .action-icon { width: 44px; height: 44px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

    /* Выбор Темы */
    .theme-sheet {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 300;
    }
    .theme-sheet.open { display: flex; }
    .theme-box { background: var(--bg); padding: 25px; border-radius: 24px; width: 80%; max-width: 300px; }
    .theme-circles { display: flex; justify-content: space-around; margin-top: 20px; }
    .circle { width: 50px; height: 50px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
    .circle.active { border-color: var(--accent); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg);
      display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border);
    }
  </style>
</head>
<body data-theme="light">

<div class="header">
  <button class="header-btn" id="book-selector">Выбор книги</button>
  <button class="header-btn" onclick="toggleThemeSheet()">Aa</button>
</div>

<div class="content">
  <div class="book-title" id="title">Загрузка...</div>
  <div id="reader"></div>
</div>

<div class="theme-sheet" id="theme-sheet" onclick="toggleThemeSheet()">
  <div class="theme-box" onclick="event.stopPropagation()">
    <div style="text-align:center; font-weight:bold;">Настройки текста</div>
    <div class="theme-circles">
      <div class="circle" style="background:#ffffff; border:1px solid #ccc;" onclick="setTheme('light')"></div>
      <div class="circle" style="background:#f4ecd8;" onclick="setTheme('sepia')"></div>
      <div class="circle" style="background:#1c1c1e;" onclick="setTheme('dark')"></div>
    </div>
  </div>
</div>

<div class="action-sheet" id="action-sheet">
  <div style="width:40px; height:4px; background:#ccc; border-radius:2px; margin: 0 auto 15px;"></div>
  <div class="action-grid">
    <div class="action-item" onclick="copyVerses()">
      <div class="action-icon">📋</div><div>Копировать</div>
    </div>
    <div class="action-item" onclick="openNotes()">
      <div class="action-icon">📝</div><div>Заметка</div>
    </div>
    <div class="action-item" onclick="sendToMentor()">
      <div class="action-icon">🕊️</div><div>Пояснить</div>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  let bibleData = null;
  let selectedVerses = new Set();

  async function init() {
    tg.expand();
    // Загружаем файл (убедись, что путь правильный)
    const res = await fetch('data/ru_synodal.json');
    bibleData = await res.json();
    renderChapter(0, 0); // По умолчанию первая книга, первая глава
  }

  function renderChapter(bIdx, cIdx) {
    const book = bibleData.books[bIdx];
    const chapter = book.chapters[cIdx];
    document.getElementById('title').innerText = `${book.name} ${cIdx + 1}`;
    
    let html = '';
    chapter.verses.forEach(v => {
      html += `<span class="verse" data-n="${v.verse}" onclick="selectVerse(this, ${v.verse})">
                <span class="verse-num">${v.verse}</span>${v.text} 
               </span>`;
    });
    document.getElementById('reader').innerHTML = html;
  }

  function selectVerse(el, num) {
    if (selectedVerses.has(num)) {
      selectedVerses.delete(num);
      el.classList.remove('selected');
    } else {
      selectedVerses.add(num);
      el.classList.add('selected');
    }
    
    const sheet = document.getElementById('action-sheet');
    selectedVerses.size > 0 ? sheet.classList.add('open') : sheet.classList.remove('open');
  }

  function setTheme(t) {
    document.body.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    toggleThemeSheet();
  }

  function toggleThemeSheet() {
    document.getElementById('theme-sheet').classList.toggle('open');
  }

  function copyVerses() {
    // Логика копирования
    tg.HapticFeedback.notificationOccurred('success');
    alert("Стихи скопированы!");
    selectedVerses.clear();
    document.querySelectorAll('.verse').forEach(v => v.classList.remove('selected'));
    document.getElementById('action-sheet').classList.remove('open');
  }

  function sendToMentor() {
      // Отправка данных боту для пояснения
      tg.sendData("explain_verse"); 
  }

  init();
</script>
</body>
</html>
