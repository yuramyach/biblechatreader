<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{--bg:#fff;--text:#1d1d1f;--surface:#f2f2f7;--accent:#a0835d;--border:rgba(0,0,0,.1);--fs:20px;}
    [data-theme="sepia"]{--bg:#f4ecd8;--text:#5b4636;--surface:#e9dec4;--accent:#8e7352;}
    [data-theme="sand"]{--bg:#f0e4d0;--text:#4a3f35;--surface:#e5d8c1;--accent:#a67c52;}
    [data-theme="olive"]{--bg:#e8eade;--text:#3c4030;--surface:#d8dbcb;--accent:#6b705c;}
    [data-theme="dark"]{--bg:#2c2c2e;--text:#f5f5f7;--surface:#3a3a3c;--accent:#d1b894;--border:rgba(255,255,255,.1);}
    [data-theme="night"]{--bg:#000;--text:#e5e5ea;--surface:#1c1c1e;--accent:#d1b894;--border:rgba(255,255,255,.2);}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;transition:.3s;line-height:1.6;}
    .header{position:sticky;top:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);}
    .header-btn{background:var(--surface);border:none;padding:8px 14px;border-radius:20px;color:var(--text);font-weight:600;font-size:14px;cursor:pointer;}
    .icon-btn{background:var(--surface);border:none;width:36px;height:36px;border-radius:50%;color:var(--text);font-size:16px;cursor:pointer;}
    .hdr-right{display:flex;gap:8px;}
    .content{padding:20px 20px 100px;max-width:600px;margin:0 auto;}
    .verse{font-family:Georgia,serif;font-size:var(--fs);display:inline;cursor:pointer;border-radius:4px;padding:2px 1px;transition:background .15s;}
    .verse.selected{background:rgba(160,131,93,.35);}
    .v-num{font-size:.6em;font-weight:bold;color:var(--accent);margin-right:5px;vertical-align:super;}
    .has-note .v-num::after{content:"·";font-size:1.4em;color:var(--accent);margin-left:1px;}
    .hl-yellow{background:rgba(255,220,50,.4);border-radius:3px;}
    .hl-green{background:rgba(100,200,100,.35);border-radius:3px;}
    .hl-blue{background:rgba(80,160,255,.3);border-radius:3px;}
    .hl-pink{background:rgba(255,100,150,.3);border-radius:3px;}
    .hl-orange{background:rgba(255,150,50,.35);border-radius:3px;}
    .nav-bar{display:flex;justify-content:space-between;margin:40px 0 20px;}
    .overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;}
    .overlay.open{display:flex;}
    .overlay-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .overlay-body{display:grid;grid-template-columns:1fr 1.2fr;flex:1;overflow:hidden;}
    .scroll-v{overflow-y:auto;padding:8px;}
    .list-item{width:100%;text-align:left;padding:14px;border:none;background:none;color:var(--text);font-size:15px;border-radius:8px;cursor:pointer;}
    .list-item.active{background:var(--accent);color:#fff;font-weight:700;}
    .chap-btn{padding:14px 0;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
    .chap-btn.cur{border-color:var(--accent);color:var(--accent);}
    .sheet{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;}
    .sheet.open{display:flex;}
    .sheet-box{background:var(--bg);width:100%;border-radius:24px 24px 0 0;padding:20px 20px 40px;max-height:85vh;overflow-y:auto;}
    .sheet-label{text-align:center;margin-bottom:10px;opacity:.5;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
    .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
    .t-btn{height:46px;border-radius:10px;border:2px solid transparent;cursor:pointer;font-size:11px;font-weight:700;}
    /* Панель стиха */
    .vp{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px 30px;z-index:250;transform:translateY(100%);transition:.25s;box-shadow:0 -4px 20px rgba(0,0,0,.15);}
    .vp.open{transform:translateY(0);}
    .vp-ref{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;}
    .vp-text{font-family:Georgia,serif;font-size:15px;opacity:.8;margin-bottom:14px;line-height:1.5;max-height:70px;overflow-y:auto;}
    .vp-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
    .vp-btn{padding:10px 6px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;}
    .vp-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
    .vp-note{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;color:var(--text);font-family:inherit;font-size:15px;resize:none;outline:none;min-height:60px;display:none;margin-bottom:10px;}
    .vp-note.show{display:block;}
    .vp-save{width:100%;padding:12px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:none;}
    .vp-save.show{display:block;}
    .vp-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;opacity:.4;padding:4px 8px;}
    /* Лист заметок */
    .ns{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:flex-end;}
    .ns.open{display:flex;}
    .ns-box{background:var(--bg);width:100%;border-radius:24px 24px 0 0;padding:20px;max-height:80vh;overflow-y:auto;}
    .note-item{padding:14px;background:var(--surface);border-radius:14px;margin-bottom:12px;position:relative;}
    .note-ref{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:5px;}
    .note-verse{font-family:Georgia,serif;font-size:13px;opacity:.65;margin-bottom:8px;font-style:italic;border-left:3px solid var(--accent);padding-left:8px;line-height:1.4;}
    .note-text{font-size:15px;line-height:1.5;}
    .color-dot{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.15s;}
    .color-dot:hover,.color-dot.active{border-color:var(--text);transform:scale(1.15);}
    .note-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text);opacity:.35;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;}
    .note-del:hover{opacity:.7;background:var(--border);}
    .empty-notes{text-align:center;padding:40px 20px;opacity:.5;font-size:15px;line-height:1.7;}
    @media(max-width:500px){.overlay-body{grid-template-columns:38% 62%;}}
  </style>
</head>
<body data-theme="sepia">
<div class="header">
  <button class="header-btn" onclick="openSelector()" id="ref-btn">Загрузка...</button>
  <div class="hdr-right">
    <button class="icon-btn" onclick="openNotes()" title="Заметки">🗒</button>
    <button class="icon-btn" onclick="openSheet('settings-sheet')" title="Настройки">Aa</button>
  </div>
</div>
<div class="content">
  <div id="reader"></div>
  <div class="nav-bar">
    <button class="header-btn" onclick="nav(-1)">← Назад</button>
    <button class="header-btn" onclick="nav(1)">Вперед →</button>
  </div>
</div>
<!-- Оглавление -->
<div class="overlay" id="selector">
  <div class="overlay-head"><b>Оглавление</b><button class="header-btn" onclick="closeSelector()">✕</button></div>
  <div class="overlay-body">
    <div class="scroll-v" id="book-list" style="border-right:1px solid var(--border);"></div>
    <div class="scroll-v" id="chap-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-content:start;padding:12px;"></div>
  </div>
</div>
<!-- Настройки -->
<div class="sheet" id="settings-sheet" onclick="closeSheet()">
  <div class="sheet-box" onclick="event.stopPropagation()">
    <div class="sheet-label">Размер шрифта</div>
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <button class="header-btn" style="flex:1;padding:12px;" onclick="changeFs(-2)">А−</button>
      <button class="header-btn" style="flex:1;padding:12px;" onclick="changeFs(2)">А+</button>
    </div>
    <div class="sheet-label">Тема</div>
    <div class="theme-grid">
      <button class="t-btn" style="background:#fff;color:#000;border:1px solid #ddd;" onclick="setTheme('light')">Свет</button>
      <button class="t-btn" style="background:#f4ecd8;color:#5b4636;" onclick="setTheme('sepia')">Бумага</button>
      <button class="t-btn" style="background:#f0e4d0;color:#4a3f35;" onclick="setTheme('sand')">Песок</button>
      <button class="t-btn" style="background:#e8eade;color:#3c4030;" onclick="setTheme('olive')">Олива</button>
      <button class="t-btn" style="background:#2c2c2e;color:#fff;" onclick="setTheme('dark')">Графит</button>
      <button class="t-btn" style="background:#000;color:#fff;" onclick="setTheme('night')">Ночь</button>
    </div>
    <div class="sheet-label" style="margin-top:4px;">Перевод</div>
    <div id="settings-lang-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"></div>
  </div>
</div>
<!-- Панель стиха (YouVersion style) -->
<div class="vp" id="vp">
  <button class="vp-close" onclick="clearSel()">✕</button>
  <div class="vp-ref" id="vp-ref"></div>
  <div class="vp-text" id="vp-text"></div>
  <div class="vp-actions">
    <button class="vp-btn" onclick="copyVerse()">📋 Копировать</button>
    <button class="vp-btn" onclick="explainVerse()">🕊️ Пояснить</button>
    <button class="vp-btn accent" onclick="toggleNote()">📝 Заметка</button>
  </div>
  <div class="vp-colors" id="vp-colors" style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
    <span style="font-size:12px;opacity:.6;margin-right:4px;">Цвет:</span>
    <button class="color-dot" style="background:#ffdc32;" onclick="setHL('yellow')" data-c="yellow"></button>
    <button class="color-dot" style="background:#64c864;" onclick="setHL('green')"  data-c="green"></button>
    <button class="color-dot" style="background:#50a0ff;" onclick="setHL('blue')"   data-c="blue"></button>
    <button class="color-dot" style="background:#ff6496;" onclick="setHL('pink')"   data-c="pink"></button>
    <button class="color-dot" style="background:#ff9632;" onclick="setHL('orange')" data-c="orange"></button>
    <button class="color-dot" style="background:transparent;border:1px dashed var(--border);font-size:11px;color:var(--text);padding:0 6px;width:auto;" onclick="setHL('')" title="Убрать">✕</button>
  </div>
  <textarea class="vp-note" id="vp-note" placeholder="Напишите заметку к стиху..."></textarea>
  <button class="vp-save" id="vp-save" onclick="saveNote()">Сохранить</button>
</div>
<!-- Список заметок -->
<div class="ns" id="ns" onclick="closeNotes()">
  <div class="ns-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;font-size:18px;">Мои заметки</h3>
      <button class="header-btn" onclick="closeNotes()">✕</button>
    </div>
    <div id="notes-list"></div>
  </div>
</div>
<script>
const tg=window.Telegram?.WebApp;
const BOOK_NAMES={
  ru:["Бытие","Исход","Левит","Числа","Второзаконие","Иисус Навин","Судьи","Руфь","1 Царств","2 Царств","3 Царств","4 Царств","1 Паралипоменон","2 Паралипоменон","Ездра","Неемия","Есфирь","Иов","Псалтирь","Притчи","Екклесиаст","Песня песней","Исайя","Иеремия","Плач Иеремии","Иезекиль","Даниил","Осия","Иоиль","Амос","Авдий","Иона","Михей","Наум","Аввакум","Софония","Аггей","Захария","Малахия","Матфея","Марка","Луки","Иоанна","Деяния","Римлянам","1 Коринфянам","2 Коринфянам","Галатам","Ефесянам","Филиппийцам","Колоссянам","1 Фессалоникийцам","2 Фессалоникийцам","1 Тимофею","2 Тимофею","Титу","Филимону","Евреям","Иакова","1 Петра","2 Петра","1 Иоанна","2 Иоанна","3 Иоанна","Иуды","Откровение"],
  uk:["Буття","Вихід","Левит","Числа","Повторення Закону","Ісус Навин","Судді","Рут","1 Самуїла","2 Самуїла","1 Царів","2 Царів","1 Хронік","2 Хронік","Ездра","Неємія","Естер","Йов","Псалми","Приповісті","Екклезіяст","Пісня пісень","Ісая","Єремія","Плач Єремії","Єзекіїль","Даниїл","Осія","Йоїл","Амос","Овадія","Йона","Михей","Наум","Авакум","Софонія","Огій","Захарія","Малахія","Матвія","Марка","Луки","Івана","Дії","Римлян","1 Коринтян","2 Коринтян","Галатів","Ефесян","Филип'янам","Колосян","1 Солунян","2 Солунян","1 Тимофія","2 Тимофія","Тита","Филимону","Євреїв","Якова","1 Петра","2 Петра","1 Івана","2 Івана","3 Івана","Юди","Об'явлення"],
  en:["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi","Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"],
  es:["Génesis","Éxodo","Levítico","Números","Deuteronomio","Josué","Jueces","Rut","1 Samuel","2 Samuel","1 Reyes","2 Reyes","1 Crónicas","2 Crónicas","Esdras","Nehemías","Ester","Job","Salmos","Proverbios","Eclesiastés","Cantares","Isaías","Jeremías","Lamentaciones","Ezequiel","Daniel","Oseas","Joel","Amós","Abdías","Jonás","Miqueas","Nahúm","Habacuc","Sofonías","Hageo","Zacarías","Malaquías","Mateo","Marcos","Lucas","Juan","Hechos","Romanos","1 Corintios","2 Corintios","Gálatas","Efesios","Filipenses","Colosenses","1 Tesalonicenses","2 Tesalonicenses","1 Timoteo","2 Timoteo","Tito","Filemón","Hebreos","Santiago","1 Pedro","2 Pedro","1 Juan","2 Juan","3 Juan","Judas","Apocalipsis"],
};
const FILES={ru:"data/ru_synodal.json",uk:"data/uk_ogienko.json",en:"data/en_akjv.json",es:"data/es_rv.json"};
const LABELS={ru:"RU",uk:"UK",en:"EN",es:"ES"};
let bible=null,bIdx=parseInt(localStorage.getItem("bib-b"))||0,cIdx=parseInt(localStorage.getItem("bib-c"))||0;
let lang=localStorage.getItem("bib-lang")||"ru",sel=new Map(),selBookIdx=0;
const cache=new Map();

function setHL(color){
  const nums=Array.from(sel.keys()).sort((a,b)=>a-b);
  nums.forEach(n=>{
    const k=`vhl_${lang}_${bIdx}_${cIdx}_${n}`;
    color?localStorage.setItem(k,color):localStorage.removeItem(k);
  });
  // Update active dot
  document.querySelectorAll(".color-dot").forEach(d=>{
    d.classList.toggle("active", d.dataset.c===color);
  });
  // Apply highlight visually without full re-render
  nums.forEach(n=>{
    const el=document.querySelector(`.verse[data-n="${n}"]`);
    if(!el)return;
    ["yellow","green","blue","pink","orange"].forEach(c=>el.classList.remove("hl-"+c));
    if(color)el.classList.add("hl-"+color);
  });
}

function goToVerse(nl,nb,nc,nv){
  closeNotes();
  // Switch language if needed
  if(nl!==lang){lang=nl;localStorage.setItem("bib-lang",nl);}
  bIdx=nb;cIdx=nc;
  if(cache.has(lang)){
    bible=cache.get(lang);
    render();
    // Scroll to verse after render
    setTimeout(()=>{
      const el=document.querySelector(`.verse[data-n="${nv}"]`);
      if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
    },200);
  }else{
    loadBible().then(()=>{
      setTimeout(()=>{
        const el=document.querySelector(`.verse[data-n="${nv}"]`);
        if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
      },300);
    });
  }
}

async function loadBible(){
  try{
    if(!cache.has(lang)){
      const r=await fetch(FILES[lang]);
      if(!r.ok)throw new Error("HTTP "+r.status);
      const d=await r.json();
      // Book names kept as-is from JSON files
      d.books.forEach(b=>b.chapters.forEach(ch=>ch.verses.forEach(v=>{v.text=(v.text||"").trim();})));
      cache.set(lang,d);
    }
    bible=cache.get(lang);
    bIdx=Math.min(bIdx,bible.books.length-1);
    cIdx=Math.min(cIdx,bible.books[bIdx].chapters.length-1);
    selBookIdx=bIdx;
    render();
  }catch(e){
    document.getElementById("reader").innerHTML=`<div style="padding:40px;text-align:center;color:red;font-size:16px;">
      <b>Ошибка загрузки</b><br><br>
      <span style="font-size:13px;opacity:.7;">${e.message}</span><br><br>
      Файл: data/${FILES[lang].split('/')[1]}<br><br>
      <button class="header-btn" onclick="loadBible()">Повторить</button>
    </div>`;
    document.getElementById("ref-btn").textContent="Ошибка";
  }
}

function render(){
  if(!bible)return;
  const book=bible.books[bIdx];
  const ch=book.chapters[cIdx];
  document.getElementById("ref-btn").textContent=`${book.name} ${cIdx+1} ▾`;
  localStorage.setItem("bib-b",bIdx);localStorage.setItem("bib-c",cIdx);
  let h=`<h2 style="font-family:Georgia,serif;font-size:26px;margin:0 0 18px;">${book.name} ${cIdx+1}</h2>`;
  ch.verses.forEach(v=>{
    const nk=`vnote_${lang}_${bIdx}_${cIdx}_${v.verse}`;
    const hk=`vhl_${lang}_${bIdx}_${cIdx}_${v.verse}`;
    const hasN=!!localStorage.getItem(nk);
    const hl=localStorage.getItem(hk)||"";
    const t=v.text.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    h+=`<span class="verse${hasN?' has-note':''}${hl?' hl-'+hl:''}" data-n="${v.verse}" data-t="${t}" onclick="toggleV(${v.verse},this)"><span class="v-num">${v.verse}</span>${v.text} </span>`;
  });
  document.getElementById("reader").innerHTML=h;
  clearSel();window.scrollTo(0,0);
}

function toggleV(n,el){
  if(sel.has(n)){sel.delete(n);el.classList.remove("selected");}
  else{sel.set(n,el.dataset.t);el.classList.add("selected");}
  sel.size>0?showVP():clearSel();
}

function showVP(){
  const nums=Array.from(sel.keys()).sort((a,b)=>a-b);
  const bn=bible.books[bIdx].name;
  const ref=nums.length>1?`${bn} ${cIdx+1}:${nums[0]}–${nums[nums.length-1]}`:`${bn} ${cIdx+1}:${nums[0]}`;
  const txt=nums.map(n=>sel.get(n)).join(" ");
  document.getElementById("vp-ref").textContent=ref;
  document.getElementById("vp-text").textContent=txt;
  const inp=document.getElementById("vp-note");
  const btn=document.getElementById("vp-save");
  inp.classList.remove("show");btn.classList.remove("show");
  if(nums.length===1){
    const ex=localStorage.getItem(`vnote_${lang}_${bIdx}_${cIdx}_${nums[0]}`)||"";
    inp.value=ex;
  }else inp.value="";
  // Show current highlight
  if(nums.length===1){
    const curHl=localStorage.getItem(`vhl_${lang}_${bIdx}_${cIdx}_${nums[0]}`)||"";
    document.querySelectorAll(".color-dot").forEach(d=>{
      d.classList.toggle("active", d.dataset.c===curHl);
    });
  }
  document.getElementById("vp").classList.add("open");
}

function clearSel(){
  sel.clear();
  document.querySelectorAll(".verse.selected").forEach(e=>e.classList.remove("selected"));
  document.getElementById("vp").classList.remove("open");
  document.getElementById("vp-note").classList.remove("show");
  document.getElementById("vp-save").classList.remove("show");
}

function toggleNote(){
  const i=document.getElementById("vp-note");
  const b=document.getElementById("vp-save");
  const o=i.classList.contains("show");
  i.classList.toggle("show",!o);b.classList.toggle("show",!o);
  if(!o)i.focus();
}

function saveNote(){
  const note=document.getElementById("vp-note").value.trim();
  const nums=Array.from(sel.keys()).sort((a,b)=>a-b);
  nums.forEach(n=>{
    const k=`vnote_${lang}_${bIdx}_${cIdx}_${n}`;
    note?localStorage.setItem(k,note):localStorage.removeItem(k);
  });
  render();
  nums.forEach(n=>{
    const el=document.querySelector(`.verse[data-n="${n}"]`);
    if(el){sel.set(n,el.dataset.t);el.classList.add("selected");}
  });
  showVP();
  if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred("success");
}

function copyVerse(){
  const nums=Array.from(sel.keys()).sort((a,b)=>a-b);
  const ref=`${bible.books[bIdx].name} ${cIdx+1}:${nums.length>1?nums[0]+"-"+nums[nums.length-1]:nums[0]}`;
  const txt=nums.map(n=>sel.get(n)).join(" ");
  navigator.clipboard.writeText(`${ref}\n"${txt}"`).then(()=>{if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred("success");});
  clearSel();
}

function explainVerse(){
  if(!tg)return;
  const nums=Array.from(sel.keys()).sort((a,b)=>a-b);
  const ref=`${bible.books[bIdx].name} ${cIdx+1}:${nums[0]}`;
  const txt=nums.map(n=>sel.get(n)).join(" ");
  tg.sendData(`explain:${ref}:${txt}`);clearSel();
}

function openNotes(){
  const list=document.getElementById("notes-list");
  const all=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith("vnote_"))continue;
    const p=k.split("_");if(p.length<5)continue;
    const nl=p[1],nb=parseInt(p[2]),nc=parseInt(p[3]),nv=parseInt(p[4]);
    const nt=localStorage.getItem(k);if(!nt)continue;
    const bd=cache.get(nl);if(!bd)continue;
    const bn=bd.books[nb]?.name||"?";
    const vt=bd.books[nb]?.chapters[nc]?.verses?.find(v=>v.verse===nv)?.text||"";
    all.push({k,ref:`${bn} ${nc+1}:${nv}`,verse:vt,note:nt,nl,nb,nc,nv});
  }
  if(!all.length){
    list.innerHTML='<div class="empty-notes">Нет заметок.<br><br>Нажмите на стих → Заметка<br>чтобы добавить первую заметку.</div>';
  }else{
    list.innerHTML=all.map(n=>`
      <div class="note-item">
        <div class="note-ref" style="display:flex;justify-content:space-between;align-items:center;">
          <span>${n.ref}</span>
          <button onclick="goToVerse('${n.nl}',${n.nb},${n.nc},${n.nv})"
            style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:4px 10px;font-size:12px;cursor:pointer;">
            Перейти
          </button>
        </div>
        ${n.verse?`<div class="note-verse">${n.verse}</div>`:""}
        <div class="note-text">${n.note}</div>
        <button class="note-del" onclick="delNote('${n.k}')">Удалить</button>
      </div>`).join("");
  }
  document.getElementById("ns").classList.add("open");
}
function closeNotes(){document.getElementById("ns").classList.remove("open");}
function delNote(k){localStorage.removeItem(k);openNotes();render();}

function nav(d){
  cIdx+=d;
  if(cIdx<0){if(bIdx>0){bIdx--;cIdx=bible.books[bIdx].chapters.length-1;}else cIdx=0;}
  else if(cIdx>=bible.books[bIdx].chapters.length){if(bIdx<bible.books.length-1){bIdx++;cIdx=0;}else cIdx=bible.books[bIdx].chapters.length-1;}
  render();
}

function openSelector(){
  selBookIdx=bIdx;
  document.getElementById("selector").classList.add("open");
  renderBL();renderCG(bIdx);
}
function renderLR(){ /* lang row now in settings */ }

function renderSettingsLang(){
  const row=document.getElementById("settings-lang-row");
  if(!row)return;
  row.innerHTML=Object.entries(LABELS).map(([k,v])=>
    `<button class="header-btn" style="${k===lang?'background:var(--accent);color:#fff;':''};width:100%;padding:10px 0;" onclick="switchL('${k}');renderSettingsLang()">${v}</button>`
  ).join("");
}
function renderBL(){
  document.getElementById("book-list").innerHTML=bible.books.map((b,i)=>
    `<button class="list-item${i===selBookIdx?' active':''}" onclick="selBookIdx=${i};renderBL();renderCG(${i})">${b.name}</button>`
  ).join("");
}
function renderCG(bi){
  document.getElementById("chap-grid").innerHTML=bible.books[bi].chapters.map((_,c)=>
    `<button class="chap-btn${bi===bIdx&&c===cIdx?' cur':''}" onclick="bIdx=${bi};cIdx=${c};render();closeSelector();">${c+1}</button>`
  ).join("");
}
function switchL(l){lang=l;localStorage.setItem("bib-lang",l);bIdx=0;cIdx=0;selBookIdx=0;closeSheet();loadBible().then(()=>{renderBL();renderCG(0);});}
function closeSelector(){document.getElementById("selector").classList.remove("open");}
function openSheet(id){
  document.getElementById(id).classList.add("open");
  if(id==="settings-sheet") renderSettingsLang();
}
function closeSheet(){document.querySelectorAll(".sheet").forEach(s=>s.classList.remove("open"));}
function setTheme(t){
  document.body.setAttribute("data-theme",t);localStorage.setItem("bib-theme",t);
  if(tg)try{const c={light:"#fff",sepia:"#f4ecd8",sand:"#f0e4d0",olive:"#e8eade",dark:"#2c2c2e",night:"#000"};tg.setBackgroundColor(c[t]);tg.setHeaderColor(c[t]);}catch(e){}
  closeSheet();
}
function changeFs(d){
  let c=parseInt(localStorage.getItem("bib-fs")||20);
  c=Math.max(14,Math.min(32,c+d));
  localStorage.setItem("bib-fs",c);
  document.documentElement.style.setProperty("--fs",c+"px");
}
const st=localStorage.getItem("bib-theme")||"sepia";
document.body.setAttribute("data-theme",st);
document.documentElement.style.setProperty("--fs",(localStorage.getItem("bib-fs")||20)+"px");
if(tg){tg.ready();tg.expand();}
loadBible();
</script>
