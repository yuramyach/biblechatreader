<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #ffffff; --text: #1d1d1f; --surface: #f5f5f7;
      --muted: #86868b; --border: rgba(0, 0, 0, 0.08);
      --accent: #007aff; --nav-bg: rgba(255, 255, 255, 0.85);
      --shadow: 0 -4px 24px rgba(0, 0, 0, 0.08); --font-size: 19px;
    }
    :root[data-theme="sepia"] {
      --bg: #fbf0d9; --text: #433422; --surface: #f0e3c8;
      --muted: #8a7b66; --border: rgba(67, 52, 34, 0.15);
      --accent: #d97706; --nav-bg: rgba(251, 240, 217, 0.85);
      --shadow: 0 -4px 24px rgba(67, 52, 34, 0.1);
    }
    :root[data-theme="dark"] {
      --bg: #1c1c1e; --text: #f5f5f7; --surface: #2c2c2e;
      --muted: #8e8e93; --border: rgba(255, 255, 255, 0.1);
      --accent: #0a84ff; --nav-bg: rgba(28, 28, 30, 0.85);
      --shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
    }
    :root[data-theme="night"] {
      --bg: #000000; --text: #e5e5ea; --surface: #1c1c1e;
      --muted: #666666; --border: rgba(255, 255, 255, 0.2);
      --accent: #5e5ce6; --nav-bg: rgba(0, 0, 0, 0.85);
      --shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .header { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; padding: max(12px, env(safe-area-inset-top)) 16px 12px; border-bottom: 1px solid var(--border); background: var(--nav-bg); backdrop-filter: blur(12px); }
    .header-title { border: none; background: transparent; color: var(--text); font-size: 17px; font-weight: 600; cursor: pointer; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
    .reader-wrap { display: flex; justify-content: center; padding: 20px 24px 140px; }
    .reader { width: 100%; max-width: 640px; font-family: Georgia, serif; font-size: var(--font-size); line-height: 1.65; }
    .chapter-heading { font-family: sans-serif; font-size: 15px; color: var(--muted); text-transform: uppercase; font-weight: bold; margin-bottom: 24px; }
    .verse { display: inline; cursor: pointer; border-radius: 6px; padding: 2px 0; }
    .verse.selected { background: var(--accent); color: #fff; }
    .verse-num { font-size: 0.6em; color: var(--accent); font-weight: bold; vertical-align: super; margin-right: 4px; }
    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25; border-top: 1px solid var(--border); background: var(--nav-bg); backdrop-filter: blur(12px); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .nav-btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 10px; padding: 12px 4px; font-size: 13px; font-weight: 600; }
    .overlay { position: fixed; inset: 0; z-index: 40; display: none; flex-direction: column; background: var(--bg); }
    .overlay.open { display: flex; }
    .overlay-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
    .overlay-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .book-list { border-right: 1px solid var(--border); overflow-y: auto; padding: 8px; }
    .chapter-grid { overflow-y: auto; padding: 16px; display: grid; gap: 10px; grid-template-columns: repeat(4, 1fr); align-content: start; }
    .list-item { width: 100%; border: none; background: transparent; color: var(--text); text-align: left; padding: 12px; border-radius: 8px; font-size: 15px; }
    .list-item.active { background: var(--accent); color: #fff; }
    .chapter-btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 10px; padding: 12px 0; font-size: 16px; }
    .bottom-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 51; background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(105%); transition: 0.3s; box-shadow: var(--shadow); }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: var(--muted); border-radius: 2px; margin: 0 auto 15px; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 100; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="toast" id="toast">Скопировано!</div>
  <header class="header">
    <button class="header-title" id="open-selector">Выбор книги ▾</button>
    <button class="icon-btn" id="open-theme">Aa</button>
  </header>
  <main class="reader-wrap"><article class="reader" id="reader"></article></main>
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="changeChap(-1)">Назад</button>
    <button class="nav-btn" onclick="sendToBot('action:open_prayers')">Молитвы</button>
    <button class="nav-btn" id="open-notes">Заметки</button>
    <button class="nav-btn" onclick="changeChap(1)">Вперед</button>
  </nav>

  <section class="overlay" id="selector-overlay">
    <div class="overlay-header"><h3>Библия</h3><button onclick="closeOverlay()">✕</button></div>
    <div class="overlay-body">
      <div class="book-list" id="book-list"></div>
      <div class="chapter-grid" id="chapter-grid"></div>
    </div>
  </section>

  <section class="bottom-sheet" id="verse-sheet">
    <div class="sheet-handle"></div>
    <div id="selected-ref" style="font-weight:bold; margin-bottom:10px;"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <button class="nav-btn" onclick="copyVerse()">Копия</button>
      <button class="nav-btn" onclick="sendToBot('explain')">Пояснение</button>
    </div>
  </section>

  <script>
    const tg = window.Telegram.WebApp;
    const state = { bible: null, bIdx: 0, cNum: 1, selected: new Map() };
    const langFiles = { ru: 'data/ru_synodal.json', uk: 'data/uk_ogienko.json', en: 'data/en_akjv.json', es: 'data/es_rv.json' };

    async function loadBible() {
      const lang = tg.initDataUnsafe.user?.language_code?.startsWith('uk') ? 'uk' : 'ru';
      const res = await fetch(langFiles[lang] + '?v=' + Date.now());
      state.bible = await res.json();
      renderReader();
    }

    function renderReader() {
      const book = state.bible.books[state.bIdx];
      document.getElementById('open-selector').textContent = `${book.name} ${state.cNum} ▾`;
      let html = `<div class="chapter-heading">${book.name} ${state.cNum}</div>`;
      book.chapters[state.cNum-1].verses.forEach(v => {
        html += `<span class="verse" onclick="toggleVerse(${v.verse}, '${v.text.replace(/'/g,"")}', this)"><sup class="verse-num">${v.verse}</sup>${v.text} </span>`;
      });
      document.getElementById('reader').innerHTML = html;
      window.scrollTo(0,0);
    }

    function toggleVerse(n, txt, el) {
      if(state.selected.has(n)) { state.selected.delete(n); el.classList.remove('selected'); }
      else { state.selected.set(n, txt); el.classList.add('selected'); }
      const sheet = document.getElementById('verse-sheet');
      if(state.selected.size > 0) {
        sheet.classList.add('open');
        document.getElementById('selected-ref').textContent = `Выбрано: ${state.selected.size}`;
      } else sheet.classList.remove('open');
    }

    function changeChap(dir) {
      state.cNum += dir;
      if(state.cNum < 1) { state.bIdx = Math.max(0, state.bIdx-1); state.cNum = 1; }
      renderReader();
    }

    function sendToBot(cmd) {
      const book = state.bible.books[state.bIdx].name;
      const nums = Array.from(state.selected.keys()).join(',');
      const text = Array.from(state.selected.values()).join(' ');
      tg.sendData(`${cmd}:${book}:${state.cNum}:${nums}:${text}`);
      state.selected.clear();
      document.getElementById('verse-sheet').classList.remove('open');
    }

    document.getElementById('open-selector').onclick = () => {
      document.getElementById('selector-overlay').classList.add('open');
      const list = document.getElementById('book-list');
      list.innerHTML = state.bible.books.map((b, i) => 
        `<button class="list-item ${i===state.bIdx?'active':''}" onclick="selectBook(${i})">${b.name}</button>`
      ).join('');
      selectBook(state.bIdx);
    };

    function selectBook(i) {
      state.bIdx = i;
      const grid = document.getElementById('chapter-grid');
      grid.innerHTML = state.bible.books[i].chapters.map((_, c) => 
        `<button class="chapter-btn" onclick="state.cNum=${c+1}; renderReader(); closeOverlay();">${c+1}</button>`
      ).join('');
    }

    function closeOverlay() { document.getElementById('selector-overlay').classList.remove('open'); }
    tg.ready(); tg.expand(); loadBible();
  </script>
</body>
</html>
