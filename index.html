<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bible App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg:#ffffff;--text:#1d1d1f;--surface:#f5f5f7;--muted:#86868b;--border:rgba(0,0,0,0.08);--accent:#007aff;--nav-bg:rgba(255,255,255,0.85);--shadow:0 -4px 24px rgba(0,0,0,0.08);--font-size:19px; }
    :root[data-theme="sepia"] { --bg:#fbf0d9;--text:#433422;--surface:#f0e3c8;--muted:#8a7b66;--border:rgba(67,52,34,0.15);--accent:#d97706;--nav-bg:rgba(251,240,217,0.85); }
    :root[data-theme="dark"]  { --bg:#1c1c1e;--text:#f5f5f7;--surface:#2c2c2e;--muted:#8e8e93;--border:rgba(255,255,255,0.1);--accent:#0a84ff;--nav-bg:rgba(28,28,30,0.85); }
    :root[data-theme="night"] { --bg:#000000;--text:#e5e5ea;--surface:#1c1c1e;--muted:#666666;--border:rgba(255,255,255,0.2);--accent:#5e5ce6;--nav-bg:rgba(0,0,0,0.85); }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;padding:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;transition:background .3s,color .3s;}
    .header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:max(12px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(12px);}
    .header-title{border:none;background:transparent;color:var(--text);font-size:17px;font-weight:600;cursor:pointer;}
    .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-weight:600;}
    .reader-wrap{display:flex;justify-content:center;padding:20px 24px 140px;}
    .reader{width:100%;max-width:640px;font-family:Georgia,serif;font-size:var(--font-size);line-height:1.65;transition:opacity .3s;}
    .chapter-heading{font-family:sans-serif;font-size:15px;color:var(--muted);text-transform:uppercase;font-weight:bold;margin-bottom:24px;}
    .verse{display:inline;cursor:pointer;border-radius:4px;padding:2px 0;transition:background .15s,color .15s;}
    .verse.selected{background:var(--accent);color:#fff;padding:2px 3px;}
    .verse.selected .verse-num{color:#fff;opacity:.85;}
    .verse-num{font-size:.6em;color:var(--accent);font-weight:bold;vertical-align:super;margin-right:4px;user-select:none;}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:25;border-top:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(12px);padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .nav-btn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:12px 4px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
    .overlay{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;background:var(--bg);}
    .overlay.open{display:flex;}
    .overlay-header{display:flex;justify-content:space-between;padding:max(12px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--border);}
    .overlay-title{margin:0;font-size:18px;font-weight:700;}
    .overlay-body{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;}
    .book-list{border-right:1px solid var(--border);overflow-y:auto;padding:8px;}
    .list-item{width:100%;border:none;background:transparent;color:var(--text);text-align:left;padding:14px;border-radius:10px;font-size:15px;cursor:pointer;}
    .list-item.active{background:var(--accent);color:#fff;font-weight:600;}
    .chapter-grid{overflow-y:auto;padding:16px;display:grid;gap:10px;grid-template-columns:repeat(4,1fr);align-content:start;}
    .chapter-btn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:12px;padding:14px 0;font-size:16px;font-weight:600;cursor:pointer;}
    .chapter-btn.current{border-color:var(--accent);color:var(--accent);}
    .lang-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;overflow-x:auto;}
    .chip{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;}
    .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .sheet-backdrop{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.3s;}
    .sheet-backdrop.open{opacity:1;pointer-events:auto;}
    .bottom-sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--surface);border-radius:24px 24px 0 0;padding:16px 20px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:.3s;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);}
    .bottom-sheet.open{transform:translateY(0);}
    .sheet-handle{width:40px;height:5px;border-radius:3px;background:var(--muted);margin:0 auto 16px;opacity:.5;}
    #verse-sheet{z-index:60;max-height:60vh;}
    .toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-20px);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:20px;font-size:14px;font-weight:bold;opacity:0;pointer-events:none;transition:.3s;z-index:100;}
    .toast.show{opacity:1;transform:translate(-50%,0);}
    .font-controls{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:16px;}
    .font-btn{flex:1;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:10px;padding:10px;font-weight:bold;font-size:16px;cursor:pointer;}
    @media(max-width:600px){.overlay-body{grid-template-columns:35% 65%;}}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
  <header class="header">
    <button class="header-title" id="open-selector">Загрузка...</button>
    <button class="icon-btn" id="open-theme">Aa</button>
  </header>
  <main class="reader-wrap">
    <article class="reader" id="reader"><div style="text-align:center;padding:40px;color:var(--muted)">Загрузка...</div></article>
  </main>
  <nav class="bottom-nav">
    <button class="nav-btn" id="prev-btn">◀ Назад</button>
    <button class="nav-btn" id="notes-btn">Заметки</button>
    <button class="nav-btn" id="next-btn">Вперед ▶</button>
  </nav>
</div>

<section class="overlay" id="selector-overlay">
  <div class="overlay-header">
    <h2 class="overlay-title" id="selector-title">Оглавление</h2>
    <button class="icon-btn" id="close-selector">✕</button>
  </div>
  <div class="lang-row" id="lang-row"></div>
  <div class="overlay-body">
    <div class="book-list" id="book-list"></div>
    <div class="chapter-grid" id="chapter-grid"></div>
  </div>
</section>

<div class="sheet-backdrop" id="sheet-backdrop"></div>

<section class="bottom-sheet" id="verse-sheet">
  <div class="sheet-handle"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
    <div>
      <div style="font-size:17px;font-weight:600;" id="verse-ref"></div>
      <div style="font-size:13px;color:var(--accent);font-weight:600;margin-top:2px;" id="verse-count"></div>
    </div>
    <button class="icon-btn" style="width:28px;height:28px;font-size:12px;" onclick="clearSelection()">✕</button>
  </div>
  <div style="max-height:110px;overflow-y:auto;margin-bottom:12px;border-left:3px solid var(--accent);padding-left:10px;">
    <p style="margin:0;font-family:Georgia,serif;font-size:16px;line-height:1.5;" id="verse-text"></p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
    <button class="nav-btn" style="border:none;background:var(--bg);" id="copy-verse-btn">📋 Копировать</button>
    <button class="nav-btn" style="border:none;background:var(--bg);color:var(--accent);" id="save-note-btn">📝 Заметка</button>
  </div>
  <textarea id="note-input" placeholder="Напиши заметку к стиху..."
    style="width:100%;min-height:70px;border:1px solid var(--border);border-radius:12px;padding:10px;background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;display:none;margin-bottom:10px;"></textarea>
  <button id="save-note-confirm" style="width:100%;display:none;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;">Сохранить заметку</button>
</section>

<section class="bottom-sheet" id="notes-sheet">
  <div class="sheet-handle"></div>
  <h3 style="margin:0 0 16px;" id="notes-sheet-title">Заметки</h3>
  <div id="notes-list" style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px;"></div>
  <button class="nav-btn" style="width:100%;" id="close-notes-btn">Закрыть</button>
</section>

<section class="bottom-sheet" id="theme-sheet">
  <div class="sheet-handle"></div>
  <h3 style="margin:0 0 16px;" id="theme-title">Настройки</h3>
  <div class="font-controls">
    <button class="font-btn" onclick="changeFontSize(-2)">А-</button>
    <button class="font-btn" onclick="changeFontSize(2)">А+</button>
  </div>
  <div id="theme-options" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
  <button class="nav-btn" style="width:100%;" id="close-theme-btn">Закрыть</button>
</section>

<script>
  const THEMES = { light:"Светлая", sepia:"Бумага", dark:"Темная", night:"Ночь" };
  const LANGUAGES = {
    ru: { label:"RU", file:"data/ru_synodal.json" },
    uk: { label:"UK", file:"data/uk_ogienko.json" },
    en: { label:"EN", file:"data/en_akjv.json"    },
    es: { label:"ES", file:"data/es_rv.json"      },
    hu: { label:"HU", file:"data/hu_karoli.json"  },
  };
  // Native book names per language — applied after JSON loads
  const BOOK_NAMES = {
    ru: ["Бытие","Исход","Левит","Числа","Второзаконие","Иисус Навин","Судьи","Руфь","1 Царств","2 Царств","3 Царств","4 Царств","1 Паралипоменон","2 Паралипоменон","Ездра","Неемия","Есфирь","Иов","Псалтирь","Притчи","Екклесиаст","Песня песней","Исайя","Иеремия","Плач Иеремии","Иезекиль","Даниил","Осия","Иоиль","Амос","Авдий","Иона","Михей","Наум","Аввакум","Софония","Аггей","Захария","Малахия","Матфея","Марка","Луки","Иоанна","Деяния","Римлянам","1 Коринфянам","2 Коринфянам","Галатам","Ефесянам","Филиппийцам","Колоссянам","1 Фессалоникийцам","2 Фессалоникийцам","1 Тимофею","2 Тимофею","Титу","Филимону","Евреям","Иакова","1 Петра","2 Петра","1 Иоанна","2 Иоанна","3 Иоанна","Иуды","Откровение"],
    uk: ["Буття","Вихід","Левит","Числа","Повторення Закону","Ісус Навин","Судді","Рут","1 Самуїла","2 Самуїла","1 Царів","2 Царів","1 Хронік","2 Хронік","Ездра","Неємія","Естер","Йов","Псалми","Приповісті","Екклезіяст","Пісня пісень","Ісая","Єремія","Плач Єремії","Єзекіїль","Даниїл","Осія","Йоїл","Амос","Овадія","Йона","Михей","Наум","Авакум","Софонія","Огій","Захарія","Малахія","Матвія","Марка","Луки","Івана","Дії","Римлян","1 Коринтян","2 Коринтян","Галатів","Ефесян","Филип'янам","Колосян","1 Солунян","2 Солунян","1 Тимофія","2 Тимофія","Тита","Филимону","Євреїв","Якова","1 Петра","2 Петра","1 Івана","2 Івана","3 Івана","Юди","Об'явлення"],
    en: ["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi","Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"],
    es: ["Génesis","Éxodo","Levítico","Números","Deuteronomio","Josué","Jueces","Rut","1 Samuel","2 Samuel","1 Reyes","2 Reyes","1 Crónicas","2 Crónicas","Esdras","Nehemías","Ester","Job","Salmos","Proverbios","Eclesiastés","Cantares","Isaías","Jeremías","Lamentaciones","Ezequiel","Daniel","Oseas","Joel","Amós","Abdías","Jonás","Miqueas","Nahúm","Habacuc","Sofonías","Hageo","Zacarías","Malaquías","Mateo","Marcos","Lucas","Juan","Hechos","Romanos","1 Corintios","2 Corintios","Gálatas","Efesios","Filipenses","Colosenses","1 Tesalonicenses","2 Tesalonicenses","1 Timoteo","2 Timoteo","Tito","Filemón","Hebreos","Santiago","1 Pedro","2 Pedro","1 Juan","2 Juan","3 Juan","Judas","Apocalipsis"],
    hu: ["Mózes I","Mózes II","Mózes III","Mózes IV","Mózes V","Józsué","Bírák","Ruth","1 Sámuel","2 Sámuel","1 Királyok","2 Királyok","1 Krónikák","2 Krónikák","Ezsdrás","Nehémiás","Eszter","Jób","Zsoltárok","Példabeszédek","Prédikátor","Énekek éneke","Ézsaiás","Jeremiás","Jeremiás siralmai","Ezékiel","Dániel","Hóseás","Jóel","Ámós","Abdiás","Jónás","Mikeás","Náhum","Habakuk","Zofóniás","Haggeus","Zakariás","Malakiás","Máté","Márk","Lukács","János","Apostolok cselekedetei","Róma","1 Korinthus","2 Korinthus","Galata","Efézus","Filippi","Kolosszé","1 Thessalonika","2 Thessalonika","1 Timóteus","2 Timóteus","Titusz","Filemon","Zsidók","Jakab","1 Péter","2 Péter","1 János","2 János","3 János","Júdás","Jelenések"],
  };

  const STRINGS = {
    ru: { select:"Выбор книги",  notes:"Заметки",  copied:"Скопировано!", theme:"Настройки",    noNotes:"Нет заметок",     del:"Удалить",  prev:"◀ Назад", next:"Вперед ▶", close:"Закрыть"  },
    en: { select:"Select Book",  notes:"Notes",    copied:"Copied!",       theme:"Settings",     noNotes:"No notes",        del:"Delete",   prev:"◀ Prev",  next:"Next ▶",   close:"Close"    },
    uk: { select:"Вибір книги",  notes:"Нотатки",  copied:"Скопійовано!", theme:"Налаштування", noNotes:"Немає нотаток",   del:"Видалити", prev:"◀ Назад", next:"Вперед ▶", close:"Закрити"  },
    es: { select:"Seleccionar",  notes:"Notas",    copied:"¡Copiado!",     theme:"Ajustes",      noNotes:"Sin notas",       del:"Borrar",   prev:"◀ Ant",   next:"Sig ▶",    close:"Cerrar"   },
  };

  const state = {
    theme: localStorage.getItem("bible.theme") || "sepia",
    lang:  localStorage.getItem("bible.lang")  || "ru",
    fontSize: parseInt(localStorage.getItem("bible.fontSize")) || 19,
    bookIndex: 0, chapterNumber: 1, currentBible: null, selectorBookIndex: 0,
    selectedVerses: new Map(),
  };

  const tg = window.Telegram?.WebApp;
  const cache = new Map();

  function t(key) { return (STRINGS[state.lang] || STRINGS.ru)[key] || key; }
  function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2000);
  }

  function updateLabels() {
    document.getElementById("selector-title").textContent  = t("select");
    document.getElementById("prev-btn").textContent        = t("prev");
    document.getElementById("next-btn").textContent        = t("next");
    document.getElementById("notes-btn").textContent       = t("notes");
    document.getElementById("notes-sheet-title").textContent = t("notes");
    document.getElementById("theme-title").textContent     = t("theme");
    document.getElementById("close-notes-btn").textContent = t("close");
    document.getElementById("close-theme-btn").textContent = t("close");
  }

  function changeFontSize(delta) {
    state.fontSize = Math.max(14, Math.min(28, state.fontSize + delta));
    localStorage.setItem("bible.fontSize", state.fontSize);
    document.documentElement.style.setProperty("--font-size", state.fontSize + "px");
  }

  function applyTheme(th) {
    state.theme = th; localStorage.setItem("bible.theme", th);
    document.documentElement.dataset.theme = th;
    document.getElementById("theme-options").innerHTML = Object.entries(THEMES).map(([k,name]) =>
      `<button class="list-item ${k===state.theme?"active":""}" style="border:1px solid var(--border);" onclick="applyTheme('${k}')">${name}</button>`
    ).join("");
    if (tg) { const c={light:"#ffffff",sepia:"#fbf0d9",dark:"#1c1c1e",night:"#000000"}; try{tg.setHeaderColor(c[th]);tg.setBackgroundColor(c[th]);}catch(e){} }
  }

  async function setLanguage(newLang) {
    state.lang = newLang;
    localStorage.setItem("bible.lang", newLang);
    updateLabels();

    document.getElementById("lang-row").innerHTML = Object.entries(LANGUAGES).map(([k,v]) =>
      `<button class="chip ${k===state.lang?"active":""}" onclick="setLanguage('${k}')">${v.label}</button>`
    ).join("");

    if (cache.has(newLang)) {
      state.currentBible = cache.get(newLang);
      state.bookIndex = Math.min(state.bookIndex, state.currentBible.books.length - 1);
      state.chapterNumber = Math.min(state.chapterNumber, state.currentBible.books[state.bookIndex].chapters.length);
      state.selectorBookIndex = state.bookIndex;
      renderReader();
      if (document.getElementById("selector-overlay").classList.contains("open")) renderSelector();
      return;
    }

    document.getElementById("reader").style.opacity = 0;

    try {
      const res = await fetch(LANGUAGES[newLang].file);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      data.books.forEach(b => b.chapters.forEach(ch =>
        ch.verses.forEach(v => { v.text = (v.text || "").trim(); })
      ));
      // Apply native book names from BOOK_NAMES dictionary
      const names = BOOK_NAMES[newLang];
      if (names) data.books.forEach((b, i) => { if (names[i]) b.name = names[i]; });
      cache.set(newLang, data);
      state.currentBible = data;
      state.bookIndex = Math.min(state.bookIndex, data.books.length - 1);
      state.chapterNumber = Math.min(state.chapterNumber, data.books[state.bookIndex].chapters.length);
      state.selectorBookIndex = state.bookIndex;
      renderReader();
      if (document.getElementById("selector-overlay").classList.contains("open")) renderSelector();
      setTimeout(() => document.getElementById("reader").style.opacity = 1, 150);
    } catch(e) {
      console.error("Load error:", e);
      document.getElementById("reader").style.opacity = 1;
      document.getElementById("reader").innerHTML = `
        <div style="text-align:center;padding:40px;color:red;">
          <b>Ошибка загрузки</b><br><br>
          Файл <code>${LANGUAGES[newLang].file}</code> не найден.<br>
          Убедись что JSON файлы загружены в папку <code>data/</code>.<br><br>
          <button onclick="setLanguage('${newLang}')"
            style="padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:15px;cursor:pointer">
            🔄 Повторить
          </button>
        </div>`;
    }
  }

  function renderReader() {
    if (!state.currentBible) return;
    const book = state.currentBible.books[state.bookIndex];
    document.getElementById("open-selector").textContent = `${book.name} ${state.chapterNumber} ▾`;
    const chapter = book.chapters[state.chapterNumber - 1];
    let html = `<div class="chapter-heading">${book.name} ${state.chapterNumber}</div>`;
    html += chapter.verses.map(v =>
      `<span class="verse" data-num="${v.verse}" data-text="${escapeHtml(v.text)}"><sup class="verse-num">${v.verse}</sup>${escapeHtml(v.text)} </span>`
    ).join("");
    document.getElementById("reader").innerHTML = html;
    localStorage.setItem("bible.last", JSON.stringify({ b: state.bookIndex, c: state.chapterNumber }));
  }

  // ── Verse selection ──────────────────────────────────────────────────────────
  document.getElementById("reader").addEventListener("click", e => {
    const el = e.target.closest(".verse");
    if (el) toggleVerse(parseInt(el.dataset.num), el.dataset.text, el);
  });

  function toggleVerse(num, text, el) {
    if (state.selectedVerses.has(num)) {
      state.selectedVerses.delete(num);
      el.classList.remove("selected");
    } else {
      state.selectedVerses.set(num, text);
      el.classList.add("selected");
    }
    if (state.selectedVerses.size > 0) updateVerseSheet();
    else clearSelection();
  }

  function clearSelection() {
    state.selectedVerses.clear();
    document.querySelectorAll(".verse.selected").forEach(el => el.classList.remove("selected"));
    closeSheet();
  }

  function updateVerseSheet() {
    const book = state.currentBible.books[state.bookIndex].name;
    const nums = Array.from(state.selectedVerses.keys()).sort((a,b)=>a-b);
    const refStr = nums.length > 1
      ? `${book} ${state.chapterNumber}:${nums[0]}-${nums[nums.length-1]}`
      : `${book} ${state.chapterNumber}:${nums[0]}`;
    const fullText = nums.map(n => state.selectedVerses.get(n)).join(" ");

    document.getElementById("verse-ref").textContent = refStr;
    document.getElementById("verse-count").textContent =
      nums.length > 1 ? `Выбрано стихов: ${nums.length}` : "";
    document.getElementById("verse-text").textContent = fullText;
    document.getElementById("note-input").style.display = "none";
    document.getElementById("save-note-confirm").style.display = "none";
    document.getElementById("note-input").value = "";

    // Store for copy/save
    document.getElementById("copy-verse-btn")._ref  = refStr;
    document.getElementById("copy-verse-btn")._text = fullText;
    document.getElementById("save-note-btn")._ref   = refStr;
    document.getElementById("save-note-btn")._text  = fullText;

    openSheet("verse-sheet");
  }

  document.getElementById("copy-verse-btn").onclick = function() {
    const txt = `${this._ref}\n${this._text}`;
    navigator.clipboard.writeText(txt).then(() => { showToast(t("copied")); clearSelection(); });
  };

  document.getElementById("save-note-btn").onclick = function() {
    const inp = document.getElementById("note-input");
    const btn = document.getElementById("save-note-confirm");
    inp.style.display = inp.style.display === "none" ? "block" : "none";
    btn.style.display = inp.style.display;
    if (inp.style.display !== "none") inp.focus();
  };

  document.getElementById("save-note-confirm").onclick = function() {
    const note = document.getElementById("note-input").value.trim();
    if (!note) return;
    const ref  = document.getElementById("save-note-btn")._ref;
    const text = document.getElementById("save-note-btn")._text;
    const notes = JSON.parse(localStorage.getItem("bible.notes") || "[]");
    notes.unshift({ id: Date.now(), ref, txt: note, verse: text });
    localStorage.setItem("bible.notes", JSON.stringify(notes));
    showToast("✅ Заметка сохранена");
    clearSelection();
  };

  function renderSelector() {
    document.getElementById("book-list").innerHTML = state.currentBible.books.map((b,i) =>
      `<button class="list-item ${i===state.selectorBookIndex?"active":""}" onclick="state.selectorBookIndex=${i};renderSelector();">${b.name}</button>`
    ).join("");
    document.getElementById("chapter-grid").innerHTML = state.currentBible.books[state.selectorBookIndex].chapters.map((_,i) =>
      `<button class="chapter-btn ${state.bookIndex===state.selectorBookIndex&&state.chapterNumber===i+1?"current":""}" onclick="changeChap(${state.selectorBookIndex},${i+1})">${i+1}</button>`
    ).join("");
  }

  function changeChap(bIdx, cNum) {
    document.getElementById("reader").style.opacity = 0;
    setTimeout(() => {
      state.bookIndex = bIdx; state.chapterNumber = cNum;
      state.selectedVerses.clear();
      document.getElementById("selector-overlay").classList.remove("open");
      renderReader(); window.scrollTo(0,0);
      document.getElementById("reader").style.opacity = 1;
    }, 150);
  }

  function openSheet(id) {
    document.querySelectorAll(".bottom-sheet").forEach(el => el.classList.remove("open"));
    document.getElementById("sheet-backdrop").classList.add("open");
    document.getElementById(id).classList.add("open");
  }
  function closeSheet() {
    document.querySelectorAll(".bottom-sheet,.sheet-backdrop").forEach(el => el.classList.remove("open"));
  }

  document.getElementById("open-theme").onclick     = () => openSheet("theme-sheet");
  document.getElementById("open-selector").onclick  = () => { renderSelector(); document.getElementById("selector-overlay").classList.add("open"); };
  document.getElementById("close-selector").onclick = () => document.getElementById("selector-overlay").classList.remove("open");
  document.getElementById("sheet-backdrop").onclick = closeSheet;
  document.getElementById("close-notes-btn").onclick = closeSheet;
  document.getElementById("close-theme-btn").onclick = closeSheet;

  document.getElementById("prev-btn").onclick = () => {
    if (state.chapterNumber > 1) changeChap(state.bookIndex, state.chapterNumber - 1);
    else if (state.bookIndex > 0) changeChap(state.bookIndex - 1, state.currentBible.books[state.bookIndex - 1].chapters.length);
  };
  document.getElementById("next-btn").onclick = () => {
    if (state.chapterNumber < state.currentBible.books[state.bookIndex].chapters.length) changeChap(state.bookIndex, state.chapterNumber + 1);
    else if (state.bookIndex < state.currentBible.books.length - 1) changeChap(state.bookIndex + 1, 1);
  };

  document.getElementById("notes-btn").onclick = () => {
    const notes = JSON.parse(localStorage.getItem("bible.notes") || "[]");
    document.getElementById("notes-list").innerHTML = notes.length
      ? notes.map(n => `
          <div style="padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:12px;">
            <strong style="display:block;margin-bottom:4px;color:var(--accent);">${n.ref}</strong>
            ${n.verse ? `<p style="margin:0 0 8px;font-size:13px;color:var(--muted);font-family:Georgia,serif;border-left:3px solid var(--border);padding-left:8px;">${n.verse}</p>` : ""}
            <p style="margin:0 0 10px;font-size:15px;">${n.txt}</p>
            <button class="nav-btn" style="padding:6px 12px;" onclick="delNote(${n.id})">${t("del")}</button>
          </div>`).join("")
      : `<div style="color:var(--muted);text-align:center;padding:20px;">${t("noNotes")}</div>`;
    openSheet("notes-sheet");
  };
  window.delNote = id => {
    const notes = JSON.parse(localStorage.getItem("bible.notes") || "[]").filter(n => n.id !== id);
    localStorage.setItem("bible.notes", JSON.stringify(notes));
    document.getElementById("notes-btn").click();
  };

  async function init() {
    document.documentElement.style.setProperty("--font-size", state.fontSize + "px");
    try {
      const last = JSON.parse(localStorage.getItem("bible.last"));
      if (last) { state.bookIndex = last.b; state.chapterNumber = last.c; state.selectorBookIndex = last.b; }
    } catch(e) {}
    applyTheme(state.theme);
    await setLanguage(state.lang);
    if (tg) { tg.ready(); tg.expand(); }
  }
  init();
</script>
</body>
</html>
